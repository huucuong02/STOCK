<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VN30F1M Checklist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input:checked + span { text-decoration: line-through; color: #9ca3af; }
    </style>
</head>
<body class="bg-slate-900 text-white p-4 font-sans">
    <div class="max-w-md mx-auto bg-slate-800 rounded-xl shadow-2xl border border-slate-700 overflow-hidden">
        <div class="bg-yellow-500 p-3 text-center">
            <h1 class="text-slate-900 font-bold text-xl">⚡ CHECKLIST 15M (INTRADAY)</h1>
        </div>
        
        <div class="p-5 space-y-4">
            <!-- Section 1 -->
            <div>
                <h2 class="text-blue-400 font-bold mb-2">1. TREND & VỊ TRÍ (BẮT BUỘC)</h2>
                <div class="space-y-2">
                    <label class="flex items-center space-x-3 bg-slate-700/50 p-2 rounded cursor-pointer">
                        <input type="checkbox" class="w-5 h-5 accent-yellow-500">
                        <span>Giá vs MA50/200 (Trên/Dưới)</span>
                    </label>
                    <label class="flex items-center space-x-3 bg-slate-700/50 p-2 rounded cursor-pointer">
                        <input type="checkbox" class="w-5 h-5 accent-yellow-500">
                        <span>Tại Kháng cự/Hỗ trợ (Không trade ở giữa)</span>
                    </label>
                </div>
            </div>

            <!-- Section 2 -->
            <div>
                <h2 class="text-green-400 font-bold mb-2">2. TÍN HIỆU & VOL</h2>
                <div class="space-y-2">
                    <label class="flex items-center space-x-3 bg-slate-700/50 p-2 rounded cursor-pointer">
                        <input type="checkbox" class="w-5 h-5 accent-yellow-500">
                        <span>Nến mạnh / Rút chân / Engulfing</span>
                    </label>
                    <label class="flex items-center space-x-3 bg-slate-700/50 p-2 rounded cursor-pointer">
                        <input type="checkbox" class="w-5 h-5 accent-yellow-500">
                        <span>Volume tăng khi Break/Hồi</span>
                    </label>
                </div>
            </div>

            <!-- Section 3 -->
            <div>
                <h2 class="text-red-400 font-bold mb-2">3. TIMING & RR</h2>
                <div class="space-y-2">
                    <label class="flex items-center space-x-3 bg-slate-700/50 p-2 rounded cursor-pointer">
                        <input type="checkbox" class="w-5 h-5 accent-yellow-500">
                        <span>Stoch RSI/RSI (Overbought/Oversold)</span>
                    </label>
                    <label class="flex items-center space-x-3 bg-slate-700/50 p-2 rounded cursor-pointer">
                        <input type="checkbox" class="w-5 h-5 accent-yellow-500">
                        <span>RR đủ (SL -2đ | TP +3đ trở lên)</span>
                    </label>
                </div>
            </div>

            <div class="border-t border-slate-700 pt-4">
                <p class="text-xs text-slate-400 italic text-center">Đủ 5/6 điều kiện -> VÀO LỆNH</p>
                <div class="mt-3 flex justify-between">
                    <button onclick="window.location.reload()" class="bg-slate-700 hover:bg-slate-600 px-4 py-1 rounded text-sm transition">Reset</button>
                    <span class="text-red-500 font-bold text-sm">2 LỆNH SAI -> NGHỈ!</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
